processes:
  frontend:
    command: trunk watch --dist dist
    working_dir: ./crates/frontend
    readiness_probe:
      exec:
        command: "test -f ./dist/index.html"
      initial_delay_seconds: 5
      period_seconds: 10
    availability:
      restart: on_failure
      backoff_seconds: 3
      max_restarts: 5

  worker:
    command: wrangler dev --live-reload
    depends_on:
      frontend:
        condition: process_healthy
    availability:
      restart: on_failure
      backoff_seconds: 3
      max_restarts: 5
