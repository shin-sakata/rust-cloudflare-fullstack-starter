<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rust Cloudflare Example</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; }

      .page-root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 32px;
        border-bottom: 1px solid var(--colorNeutralStroke2);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-left { display: flex; align-items: center; gap: 10px; }
      .nav-right { display: flex; align-items: center; gap: 20px; }
      .nav-link {
        text-decoration: none;
        color: var(--colorNeutralForeground2);
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-link:hover { color: var(--colorNeutralForeground1); }

      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 64px 24px;
      }
      .hero-inner {
        max-width: 640px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        text-align: center;
      }

      .hero-title {
        font-size: 56px;
        font-weight: 900;
        margin: 0;
        letter-spacing: -2px;
        line-height: 1.1;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero-subtitle {
        font-size: 18px;
        margin: 0;
        opacity: 0.5;
        font-weight: 400;
      }

      .badge-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        width: 100%;
      }
      @media (max-width: 560px) {
        .card-grid { grid-template-columns: 1fr; }
      }

      .info-card {
        border: 1px solid var(--colorNeutralStroke2);
        border-radius: 12px;
        padding: 24px;
        background: var(--colorNeutralBackground2);
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .info-card:hover {
        border-color: var(--colorBrandStroke1);
        box-shadow: 0 0 0 1px var(--colorBrandStroke1);
      }
      .info-card h3 {
        margin: 0 0 12px 0;
        font-size: 15px;
        font-weight: 600;
      }
      .info-card p, .info-card code {
        margin: 0;
        font-size: 13px;
        opacity: 0.7;
        line-height: 1.7;
      }
      .info-card code {
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 12px;
      }

      .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

      .stack-table {
        width: 100%;
        border-collapse: collapse;
      }
      .stack-table td {
        padding: 8px 0;
        font-size: 14px;
        border-bottom: 1px solid var(--colorNeutralStroke2);
      }
      .stack-table tr:last-child td { border-bottom: none; }
      .stack-table td:first-child { font-weight: 600; }
      .stack-table td:last-child { text-align: right; opacity: 0.6; }

      .not-found {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 64px 24px;
      }
      .not-found-code {
        font-size: 120px;
        font-weight: 900;
        opacity: 0.08;
        line-height: 1;
        margin: 0;
      }
    </style>
  </head>
  <body></body>
</html>
